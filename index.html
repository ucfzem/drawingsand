<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DrawingSand — Dessine dans le sable</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh; min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
header {
  width: 100%;
  max-width: 900px;
  padding: 8px 12px 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 4px;
}
h1 { font-size: clamp(1rem, 3.5vw, 1.4rem); font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; }
h1 span { color: #e8c56d; }
.toolbar {
  width: 100%;
  max-width: 900px;
  padding: 4px 12px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
}
.sand-row {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  align-items: center;
}
.sand-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border 0.15s;
  flex-shrink: 0;
}
.sand-btn:active { transform: scale(0.9); }
.sand-btn.active { border-color: #fff; transform: scale(1.15); }
.tool-divider { width: 1px; height: 28px; background: #333; margin: 0 4px; }
.icon-btn {
  background: #2a2a4a;
  border: none;
  color: #ccc;
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.icon-btn:hover { background: #3a3a5a; }
.icon-btn:active { background: #4a4a6a; }
.icon-btn.active { background: #e8c56d; color: #1a1a2e; }
.canvas-wrapper {
  flex: 1;
  width: 100%;
  max-width: 900px;
  padding: 6px 12px 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
canvas {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  cursor: crosshair;
  touch-action: none;
  display: block;
  background: #d4b886;
}
.objects-tray {
  width: 100%;
  max-width: 900px;
  padding: 4px 12px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  overflow-x: auto;
}
.obj-btn {
  background: #2a2a4a;
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: clamp(1.2rem, 3vw, 1.6rem);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: border 0.15s, background 0.15s;
  flex-shrink: 0;
  white-space: nowrap;
  color: #ccc;
  line-height: 1;
}
.obj-btn:hover { background: #3a3a5a; }
.obj-btn.active { border-color: #e8c56d; background: #3a3a4a; }
.obj-btn .label { font-size: 0.6rem; color: #888; }
.size-slider {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.size-slider input[type=range] {
  width: 60px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #333;
  border-radius: 2px;
  outline: none;
}
.size-slider input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #e8c56d;
  cursor: pointer;
}
.size-slider span { font-size: 0.7rem; color: #888; min-width: 28px; text-align: center; }
@media (max-width: 480px) {
  header { padding: 4px 8px 2px; }
  .toolbar { padding: 2px 8px; }
  .canvas-wrapper { padding: 4px 8px 2px; }
  .objects-tray { padding: 2px 8px 8px; gap: 3px; }
  .sand-btn { width: 26px; height: 26px; }
  .obj-btn { padding: 4px 8px; }
}
@media (min-width: 1200px) {
  body { padding: 10px 0; }
  h1 { font-size: 1.6rem; }
  canvas { border-radius: 20px; }
}
</style>
</head>
<body>

<header>
  <h1>🏖️ <span>Drawing</span>Sand</h1>
  <div style="display:flex;gap:6px;align-items:center;">
    <span style="font-size:0.7rem;color:#666;display:flex;align-items:center;gap:4px;">🖌️ <span id="brushSizeLabel">12</span></span>
    <input type="range" id="brushSlider" min="4" max="40" value="12" style="width:60px;">
    <button class="icon-btn" id="undoBtn" title="Annuler">↩️</button>
    <button class="icon-btn" id="clearBtn" title="Tout effacer">🗑️</button>
    <button class="icon-btn" id="saveBtn" title="Sauvegarder">💾</button>
  </div>
</header>

<div class="toolbar">
  <div class="sand-row" id="sandRow"></div>
  <div class="tool-divider"></div>
  <button class="icon-btn active" id="drawMode" title="Dessiner">✏️</button>
  <button class="icon-btn" id="dragMode" title="Déplacer les objets">✋</button>
</div>

<div class="canvas-wrapper">
  <canvas id="sandCanvas"></canvas>
</div>

<div class="objects-tray" id="objectsTray"></div>

<script>
// ─── Sand Types ───────────────────────────────────────────────────────────
var SANDS = [
  { id:'beach',   name:'Plage',       base:'#d4b886', dark:'#a0885a', grain:'#c9ac7a' },
  { id:'sahara',  name:'Sahara',      base:'#e8c56d', dark:'#b8983a', grain:'#dbb95a' },
  { id:'wet',     name:'Mouillé',     base:'#8b7355', dark:'#5a4a34', grain:'#7a6448' },
  { id:'dry',     name:'Sec',         base:'#e6d5b8', dark:'#b8a88a', grain:'#d4c4a4' },
  { id:'yellow',  name:'Jaune',       base:'#e8d44d', dark:'#b8a428', grain:'#dcc83a' },
  { id:'white',   name:'Blanc',       base:'#f5ede0', dark:'#c8b8a0', grain:'#e8dcc8' },
  { id:'gold',    name:'Doré',        base:'#d4a84b', dark:'#a87a20', grain:'#c89838' },
  { id:'red',     name:'Rouge',       base:'#c0603a', dark:'#8a3a1a', grain:'#b05028' },
  { id:'brown',   name:'Terre',       base:'#8b6914', dark:'#5a3e08', grain:'#7a5a10' },
  { id:'grass',   name:'Herbe',       base:'#6b8e23', dark:'#3a5a10', grain:'#5a7a18' },
];

// ─── Objects ──────────────────────────────────────────────────────────────
var OBJECTS = [
  { emoji:'🩴', label:'Tongs' },
  { emoji:'🏖️', label:'Parapluie' },
  { emoji:'🕶️', label:'Lunettes' },
  { emoji:'🧃', label:'Jus' },
  { emoji:'👛', label:'Portefeuille' },
  { emoji:'🧢', label:'Casquette' },
  { emoji:'🪨', label:'Pierres' },
  { emoji:'🌴', label:'Palmier' },
  { emoji:'🌸', label:'Fleurs' },
  { emoji:'🐟', label:'Poisson' },
  { emoji:'🦋', label:'Insectes' },
  { emoji:'🐚', label:'Coquillage' },
];

// ─── State ────────────────────────────────────────────────────────────────
var state = {
  sandIdx: 0,
  brushSize: 12,
  mode: 'draw', // 'draw' | 'drag'
  selectedObj: null,
  objects: [],
  undoStack: [],
  maxUndo: 30,
};

var canvas, ctx, wrapper;
var isDrawing = false;
var lastX, lastY;
var dpr = 1;

// ─── Init ─────────────────────────────────────────────────────────────────
function init() {
  canvas = document.getElementById('sandCanvas');
  ctx = canvas.getContext('2d');
  wrapper = document.querySelector('.canvas-wrapper');

  buildSandUI();
  buildObjectsUI();

  document.getElementById('brushSlider').addEventListener('input', function(e) {
    state.brushSize = +e.target.value;
    document.getElementById('brushSizeLabel').textContent = state.brushSize;
  });

  document.getElementById('drawMode').addEventListener('click', function() {
    state.mode = 'draw';
    this.classList.add('active');
    document.getElementById('dragMode').classList.remove('active');
    canvas.style.cursor = 'crosshair';
  });
  document.getElementById('dragMode').addEventListener('click', function() {
    state.mode = 'drag';
    this.classList.add('active');
    document.getElementById('drawMode').classList.remove('active');
    canvas.style.cursor = 'grab';
  });

  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('clearBtn').addEventListener('click', clearCanvas);
  document.getElementById('saveBtn').addEventListener('click', saveImage);

  resize();
  window.addEventListener('resize', resize);

  // Pointer events
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointerleave', onPointerUp);
}

// ─── Sand UI ──────────────────────────────────────────────────────────────
function buildSandUI() {
  var row = document.getElementById('sandRow');
  SANDS.forEach(function(s, i) {
    var btn = document.createElement('button');
    btn.className = 'sand-btn' + (i === state.sandIdx ? ' active' : '');
    btn.style.background = s.base;
    btn.title = s.name;
    btn.addEventListener('click', function() { selectSand(i); });
    row.appendChild(btn);
  });
}

function selectSand(i) {
  state.sandIdx = i;
  document.querySelectorAll('.sand-btn').forEach(function(b, idx) {
    b.classList.toggle('active', idx === i);
  });
  resetCanvas();
}

// ─── Objects UI ───────────────────────────────────────────────────────────
function buildObjectsUI() {
  var tray = document.getElementById('objectsTray');
  OBJECTS.forEach(function(obj, i) {
    var btn = document.createElement('button');
    btn.className = 'obj-btn';
    btn.dataset.idx = i;
    btn.innerHTML = obj.emoji + ' <span class="label">' + obj.label + '</span>';
    btn.addEventListener('click', function() { selectObject(i); });
    tray.appendChild(btn);
  });
}

function selectObject(i) {
  if (state.selectedObj === i) {
    state.selectedObj = null;
    document.querySelectorAll('.obj-btn').forEach(function(b) { b.classList.remove('active'); });
    return;
  }
  state.selectedObj = i;
  document.querySelectorAll('.obj-btn').forEach(function(b) {
    b.classList.toggle('active', +b.dataset.idx === i);
  });
}

// ─── Canvas ───────────────────────────────────────────────────────────────
function resize() {
  var rect = wrapper.getBoundingClientRect();
  var w = rect.width - 2;
  var h = rect.height - 2;

  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  canvas._w = w;
  canvas._h = h;

  resetCanvas();
}

function getSandConfig() { return SANDS[state.sandIdx]; }

function resetCanvas() {
  var cfg = getSandConfig();
  var w = canvas._w, h = canvas._h;
  ctx.fillStyle = cfg.dark;
  ctx.fillRect(0, 0, w, h);
  drawSandLayer(cfg, w, h);
  // Redraw placed objects
  state.objects.forEach(function(obj) { drawObject(obj); });
  saveUndo();
}

function drawSandLayer(cfg, w, h) {
  var imageData = ctx.getImageData(0, 0, w * dpr, h * dpr);
  var data = imageData.data;
  var base = hexToRgb(cfg.base);
  var grain = hexToRgb(cfg.grain);

  for (var i = 0; i < data.length; i += 4) {
    var noise = (Math.random() - 0.5) * 30;
    var useGrain = Math.random() < 0.3;
    var c = useGrain ? grain : base;
    data[i]     = clamp(c.r + noise + (Math.random() - 0.5) * 15);
    data[i + 1] = clamp(c.g + noise + (Math.random() - 0.5) * 15);
    data[i + 2] = clamp(c.b + noise + (Math.random() - 0.5) * 15);
    data[i + 3] = 255;
  }
  ctx.putImageData(imageData, 0, 0, 0, 0, w * dpr, h * dpr);
  // Also draw some larger grain spots
  for (var j = 0; j < 200; j++) {
    var x = Math.random() * w, y = Math.random() * h;
    var r = 1 + Math.random() * 2;
    ctx.globalAlpha = 0.3 + Math.random() * 0.4;
    ctx.fillStyle = Math.random() < 0.5 ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return { r: r, g: g, b: b };
}

function clamp(v) { return Math.max(0, Math.min(255, v)); }

// ─── Drawing ──────────────────────────────────────────────────────────────
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onPointerDown(e) {
  if (state.mode === 'draw') {
    isDrawing = true;
    var pos = getPos(e);
    lastX = pos.x; lastY = pos.y;
    drawAt(pos.x, pos.y, true);
  } else if (state.mode === 'drag') {
    // find object at position
    var pos = getPos(e);
    // check if clicked on a placed object
    for (var i = state.objects.length - 1; i >= 0; i--) {
      var obj = state.objects[i];
      var dx = pos.x - obj.x, dy = pos.y - obj.y;
      if (Math.abs(dx) < obj.size && Math.abs(dy) < obj.size) {
        dragObj = obj;
        dragOffX = dx;
        dragOffY = dy;
        return;
      }
    }
    // else place object if selected
    if (state.selectedObj !== null) {
      placeObject(state.selectedObj, pos.x, pos.y);
    }
  }
}

var dragObj = null, dragOffX = 0, dragOffY = 0;

function onPointerMove(e) {
  if (state.mode === 'draw' && isDrawing) {
    var pos = getPos(e);
    drawLine(lastX, lastY, pos.x, pos.y);
    lastX = pos.x; lastY = pos.y;
  } else if (state.mode === 'drag' && dragObj) {
    var pos = getPos(e);
    dragObj.x = pos.x - dragOffX;
    dragObj.y = pos.y - dragOffY;
    redrawAll();
  }
}

function onPointerUp(e) {
  if (isDrawing) {
    isDrawing = false;
    saveUndo();
  }
  if (dragObj) {
    dragObj = null;
    saveUndo();
  }
}

function drawAt(x, y, dot) {
  var s = state.brushSize;
  var cfg = getSandConfig();
  var dark = hexToRgb(cfg.dark);

  // Main dig
  ctx.globalCompositeOperation = 'source-over';
  for (var i = 0; i < (dot ? 20 : 8); i++) {
    var ox = (Math.random() - 0.5) * s * 0.8;
    var oy = (Math.random() - 0.5) * s * 0.8;
    var r = s * 0.2 + Math.random() * s * 0.3;
    var shade = 0.6 + Math.random() * 0.3;
    ctx.fillStyle = 'rgba(' + Math.floor(dark.r * shade) + ',' + Math.floor(dark.g * shade) + ',' + Math.floor(dark.b * shade) + ',0.9)';
    ctx.beginPath();
    ctx.arc(x + ox, y + oy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  // Edge pile (lighter)
  for (var j = 0; j < 5; j++) {
    var a = Math.random() * Math.PI * 2;
    var dist = s * 0.3 + Math.random() * s * 0.4;
    var px = x + Math.cos(a) * dist;
    var py = y + Math.sin(a) * dist;
    var pr = 2 + Math.random() * 4;
    ctx.fillStyle = 'rgba(255,255,240,' + (0.2 + Math.random() * 0.3) + ')';
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLine(x1, y1, x2, y2) {
  var dist = Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
  var steps = Math.max(1, Math.floor(dist / 2));
  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var x = x1 + (x2 - x1) * t;
    var y = y1 + (y2 - y1) * t;
    drawAt(x, y, false);
  }
}

// ─── Objects ──────────────────────────────────────────────────────────────
function placeObject(idx, x, y) {
  var obj = {
    idx: idx,
    emoji: OBJECTS[idx].emoji,
    x: x,
    y: y,
    size: 24 + state.brushSize * 0.5,
  };
  state.objects.push(obj);
  drawObject(obj);
  saveUndo();
}

function drawObject(obj) {
  var fontSize = obj.size || 28;
  ctx.font = fontSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(obj.emoji, obj.x, obj.y);
}

function redrawAll() {
  resetCanvas();
}

// ─── Actions ──────────────────────────────────────────────────────────────
function saveUndo() {
  state.undoStack.push(canvas.toDataURL());
  if (state.undoStack.length > state.maxUndo) state.undoStack.shift();
}

function undo() {
  if (state.undoStack.length <= 1) return;
  state.undoStack.pop();
  restoreFromData(state.undoStack[state.undoStack.length - 1]);
}

function restoreFromData(dataUrl) {
  var img = new Image();
  img.onload = function() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, canvas._w, canvas._h);
    ctx.drawImage(img, 0, 0, canvas._w * dpr, canvas._h * dpr, 0, 0, canvas._w, canvas._h);
  };
  img.src = dataUrl;
}

function clearCanvas() {
  if (state.objects.length === 0 && state.undoStack.length <= 1) return;
  state.objects = [];
  state.undoStack = [];
  resetCanvas();
}

function saveImage() {
  var link = document.createElement('a');
  link.download = 'drawingsand-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ─── Start ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
