<script>
var ICONS = {};

// ─── Sand Types ───────────────────────────────────────────────────────────
var SANDS = [
  { id:'beach',   name:'Plage',       base:'#d4b886', dark:'#a0885a', grain:'#c9ac7a' },
  { id:'sahara',  name:'Sahara',      base:'#e8c56d', dark:'#b8983a', grain:'#dbb95a' },
  { id:'wet',     name:'Mouillé',     base:'#8b7355', dark:'#5a4a34', grain:'#7a6448' },
  { id:'dry',     name:'Sec',         base:'#e6d5b8', dark:'#b8a88a', grain:'#d4c4a4' },
  { id:'yellow',  name:'Jaune',       base:'#e8d44d', dark:'#b8a428', grain:'#dcc83a' },
  { id:'white',   name:'Blanc',       base:'#f5ede0', dark:'#c8b8a0', grain:'#e8dcc8' },
  { id:'gold',    name:'Doré',        base:'#d4a84b', dark:'#a87a20', grain:'#c89838' },
  { id:'red',     name:'Rouge',       base:'#c0603a', dark:'#8a3a1a', grain:'#b05028' },
  { id:'brown',   name:'Terre',       base:'#8b6914', dark:'#5a3e08', grain:'#7a5a10' },
  { id:'grass',   name:'Herbe',       base:'#6b8e23', dark:'#3a5a10', grain:'#5a7a18' },
];

// ─── Objects ──────────────────────────────────────────────────────────────
var OBJECTS = [
  { emoji:'🩴', label:'Tongs' },
  { emoji:'🏖️', label:'Parapluie' },
  { emoji:'🕶️', label:'Lunettes' },
  { emoji:'🧃', label:'Jus' },
  { emoji:'👛', label:'Portefeuille' },
  { emoji:'🧢', label:'Casquette' },
  { emoji:'🪨', label:'Pierres' },
  { emoji:'🌴', label:'Palmier' },
  { emoji:'🌸', label:'Fleurs' },
  { emoji:'🐟', label:'Poisson' },
  { emoji:'🦋', label:'Insectes' },
  { emoji:'🐚', label:'Coquillage' },
];

// ─── State ────────────────────────────────────────────────────────────────
var state = {
  sandIdx: 0,
  brushSize: 12,
  mode: 'draw',
  selectedObj: null,
  objects: [],
  undoStack: [],
  maxUndo: 30,
  lowQuality: false,
  ambientOn: false,
};

var canvas, ctx, wrapper;
var isDrawing = false;
var lastX, lastY;
var dpr = 1;
var soundThrottle = 0;
var _ambientNode = null;
var _ambientGain = null;

// ─── Sound Engine ─────────────────────────────────────────────────────────
var Sound = {};
(function(){
  var actx = null;
  function getCtx() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }

  function noiseBuffer(ctx, len) {
    var sr = ctx.sampleRate;
    var buf = ctx.createBuffer(1, sr * len, sr);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  function playNoise(ctx, duration, gain, freq, type) {
    var src = ctx.createBufferSource();
    src.buffer = noiseBuffer(ctx, duration);
    var fil = ctx.createBiquadFilter();
    fil.type = type || 'lowpass';
    fil.frequency.value = freq || 2000;
    var g = ctx.createGain();
    g.gain.setValueAtTime(gain || 0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(fil); fil.connect(g); g.connect(ctx.destination);
    src.start(ctx.currentTime);
    src.stop(ctx.currentTime + duration);
  }

  Sound.draw = function() {
    try {
      var ctx = getCtx();
      playNoise(ctx, 0.08, 0.04, 800, 'lowpass');
      var src2 = ctx.createBufferSource();
      src2.buffer = noiseBuffer(ctx, 0.06);
      var fil2 = ctx.createBiquadFilter();
      fil2.type = 'bandpass';
      fil2.frequency.value = 3000 + Math.random() * 1500;
      fil2.Q.value = 2;
      var g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.015, ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      src2.connect(fil2); fil2.connect(g2); g2.connect(ctx.destination);
      src2.start(ctx.currentTime);
      src2.stop(ctx.currentTime + 0.06);
    } catch(e){}
  };

  Sound.erase = function() {
    try { var ctx = getCtx(); playNoise(ctx, 0.1, 0.03, 1200, 'lowpass'); } catch(e){}
  };

  Sound.place = function() {
    try {
      var ctx = getCtx();
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } catch(e){}
  };

  Sound.wave = function() {
    try {
      var ctx = getCtx();
      var osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 1.5);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.08, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 1.5);
      playNoise(ctx, 1.2, 0.06, 2500, 'lowpass');
      playNoise(ctx, 0.8, 0.04, 4000, 'bandpass');
    } catch(e){}
  };

  Sound.clear = function() {
    try {
      var ctx = getCtx();
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } catch(e){}
  };

  Sound.undo = function() {
    try {
      var ctx = getCtx();
      var osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.12);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } catch(e){}
  };

  Sound.save = function() {
    try {
      var ctx = getCtx();
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.04);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.08, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } catch(e){}
  };

  Sound.click = function() {
    try {
      var ctx = getCtx();
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 1000;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.04, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.04);
    } catch(e){}
  };

  // ─── Ambient ASMR Ocean ──────────────────────────────────────────────
  Sound.ambientStart = function() {
    try {
      var ctx = getCtx();
      if (_ambientNode) return;
      _ambientGain = ctx.createGain();
      _ambientGain.gain.value = 0.08;
      _ambientGain.connect(ctx.destination);

      function scheduleWave() {
        if (!_ambientGain) return;
        if (ctx.currentTime > 100) return;
        // Layered noise for surf sound
        var n1 = ctx.createBufferSource();
        n1.buffer = noiseBuffer(ctx, 2 + Math.random());
        var f1 = ctx.createBiquadFilter();
        f1.type = 'lowpass';
        f1.frequency.value = 800 + Math.random() * 400;
        n1.connect(f1); f1.connect(_ambientGain);
        n1.start(ctx.currentTime);
        n1.stop(ctx.currentTime + 2 + Math.random());

        var n2 = ctx.createBufferSource();
        n2.buffer = noiseBuffer(ctx, 1.5 + Math.random());
        var f2 = ctx.createBiquadFilter();
        f2.type = 'bandpass';
        f2.frequency.value = 2500 + Math.random() * 1500;
        f2.Q.value = 1;
        n2.connect(f2); f2.connect(_ambientGain);
        n2.start(ctx.currentTime + 0.3);
        n2.stop(ctx.currentTime + 1.8 + Math.random());

        var delay = 2000 + Math.random() * 4000;
        _ambientNode = setTimeout(scheduleWave, delay);
      }
      scheduleWave();
    } catch(e){}
  };

  Sound.ambientStop = function() {
    if (_ambientNode) { clearTimeout(_ambientNode); _ambientNode = null; }
    if (_ambientGain) {
      try { _ambientGain.disconnect(); } catch(e){}
      _ambientGain = null;
    }
  };
})();

// ─── Init ─────────────────────────────────────────────────────────────────
function init() {
  canvas = document.getElementById('sandCanvas');
  ctx = canvas.getContext('2d');
  wrapper = document.querySelector('.canvas-wrapper');

  buildSandUI();
  buildObjectsUI();

  document.getElementById('brushSlider').addEventListener('input', function(e) {
    state.brushSize = +e.target.value;
    document.getElementById('brushSizeLabel').textContent = state.brushSize;
  });

  function setMode(id, mode, cursor) {
    document.getElementById(id).addEventListener('click', function() {
      Sound.click();
      state.mode = mode;
      ['drawMode','eraseMode','dragMode'].forEach(function(m) {
        document.getElementById(m).classList.toggle('active', m === id);
      });
      canvas.style.cursor = cursor;
    });
  }
  setMode('drawMode', 'draw', 'crosshair');
  setMode('eraseMode', 'erase', 'cell');
  setMode('dragMode', 'drag', 'grab');

  document.getElementById('undoBtn').addEventListener('click', function(){ Sound.click(); undo(); });
  document.getElementById('clearBtn').addEventListener('click', function(){ Sound.click(); clearCanvas(); });
  document.getElementById('waveBtn').addEventListener('click', function(){ Sound.click(); waveAnimation(); });
  document.getElementById('saveBtn').addEventListener('click', function(){ Sound.click(); saveImage(); });
  document.getElementById('qualityBtn').addEventListener('click', function(){ Sound.click(); toggleQuality(); });
  document.getElementById('ambientBtn').addEventListener('click', function(){ Sound.click(); toggleAmbient(); });

  resize();
  window.addEventListener('resize', resize);

  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointerleave', onPointerUp);
}

// ─── Sand UI ──────────────────────────────────────────────────────────────
function buildSandUI() {
  var row = document.getElementById('sandRow');
  SANDS.forEach(function(s, i) {
    var btn = document.createElement('button');
    btn.className = 'sand-btn' + (i === state.sandIdx ? ' active' : '');
    btn.style.background = s.base;
    btn.title = s.name;
    btn.addEventListener('click', function() { selectSand(i); });
    row.appendChild(btn);
  });
}

function selectSand(i) {
  state.sandIdx = i;
  document.querySelectorAll('.sand-btn').forEach(function(b, idx) {
    b.classList.toggle('active', idx === i);
  });
  resetCanvas();
}

// ─── Objects UI ───────────────────────────────────────────────────────────
function buildObjectsUI() {
  var tray = document.getElementById('objectsTray');
  OBJECTS.forEach(function(obj, i) {
    var btn = document.createElement('button');
    btn.className = 'obj-btn';
    btn.dataset.idx = i;
    btn.innerHTML = obj.emoji + ' <span class="label">' + obj.label + '</span>';
    btn.addEventListener('click', function() { selectObject(i); });
    tray.appendChild(btn);
  });
}

function selectObject(i) {
  if (state.selectedObj === i) {
    state.selectedObj = null;
    document.querySelectorAll('.obj-btn').forEach(function(b) { b.classList.remove('active'); });
    return;
  }
  state.selectedObj = i;
  document.querySelectorAll('.obj-btn').forEach(function(b) {
    b.classList.toggle('active', +b.dataset.idx === i);
  });
}

// ─── Quality Toggle ──────────────────────────────────────────────────────
function toggleQuality() {
  state.lowQuality = !state.lowQuality;
  document.getElementById('qualityBtn').classList.toggle('active', state.lowQuality);
  showToast(state.lowQuality ? '🔋 Mode éco activé' : '⚡ Qualité normale');
  resize();
}

// ─── Ambient Toggle ──────────────────────────────────────────────────────
function toggleAmbient() {
  state.ambientOn = !state.ambientOn;
  document.getElementById('ambientBtn').classList.toggle('active', state.ambientOn);
  if (state.ambientOn) {
    Sound.ambientStart();
    showToast('🌊 Vagues d\'ambiance...', 1500);
  } else {
    Sound.ambientStop();
  }
}

// ─── Canvas ───────────────────────────────────────────────────────────────
function resize() {
  var rect = wrapper.getBoundingClientRect();
  var w = rect.width - 2;
  var h = rect.height - 2;

  dpr = Math.min(window.devicePixelRatio || 1, state.lowQuality ? 1 : 2);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  canvas._w = w;
  canvas._h = h;

  resetCanvas(true);
  state.undoStack = [canvas.toDataURL()];
}

function getSandConfig() { return SANDS[state.sandIdx]; }

function resetCanvas(skipUndo) {
  var cfg = getSandConfig();
  var w = canvas._w, h = canvas._h;
  ctx.fillStyle = cfg.dark;
  ctx.fillRect(0, 0, w, h);
  drawSandLayer(cfg, w, h);
  state.objects.forEach(function(obj) { drawObject(obj); });
  if (!skipUndo) saveUndo();
}

function drawSandLayer(cfg, w, h) {
  var imageData = ctx.getImageData(0, 0, w * dpr, h * dpr);
  var data = imageData.data;
  var base = hexToRgb(cfg.base);
  var grain = hexToRgb(cfg.grain);
  var pw = w * dpr;
  var step = state.lowQuality ? 4 : 2;
  for (var py = 0; py < h * dpr; py += step) {
    for (var px = 0; px < pw; px += step) {
      var noise = (Math.random() - 0.5) * 30;
      var useGrain = Math.random() < 0.3;
      var c = useGrain ? grain : base;
      var jr = (Math.random() - 0.5) * 15;
      var rr = clamp(c.r + noise + jr);
      var gg = clamp(c.g + noise + jr);
      var bb = clamp(c.b + noise + jr);
      for (var dy = 0; dy < step && py + dy < h * dpr; dy++) {
        for (var dx = 0; dx < step && px + dx < pw; dx++) {
          var idx = ((py + dy) * pw + (px + dx)) * 4;
          data[idx] = rr; data[idx+1] = gg; data[idx+2] = bb; data[idx+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imageData, 0, 0, 0, 0, w * dpr, h * dpr);
  for (var j = 0; j < (state.lowQuality ? 80 : 200); j++) {
    var x = Math.random() * w, y = Math.random() * h;
    var r = 1 + Math.random() * 2;
    ctx.globalAlpha = 0.3 + Math.random() * 0.4;
    ctx.fillStyle = Math.random() < 0.5 ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return { r: r, g: g, b: b };
}

function clamp(v) { return Math.max(0, Math.min(255, v)); }

// ─── Drawing ──────────────────────────────────────────────────────────────
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onPointerDown(e) {
  if (state.mode === 'draw' || state.mode === 'erase') {
    isDrawing = true;
    var pos = getPos(e);
    lastX = pos.x; lastY = pos.y;
    drawAt(pos.x, pos.y, true);
  } else if (state.mode === 'drag') {
    var pos = getPos(e);
    for (var i = state.objects.length - 1; i >= 0; i--) {
      var obj = state.objects[i];
      var dx = pos.x - obj.x, dy = pos.y - obj.y;
      if (Math.abs(dx) < obj.size && Math.abs(dy) < obj.size) {
        dragObj = obj;
        dragOffX = dx;
        dragOffY = dy;
        return;
      }
    }
    if (state.selectedObj !== null) {
      placeObject(state.selectedObj, pos.x, pos.y);
    }
  }
}

var dragObj = null, dragOffX = 0, dragOffY = 0;

function onPointerMove(e) {
  if ((state.mode === 'draw' || state.mode === 'erase') && isDrawing) {
    var pos = getPos(e);
    drawLine(lastX, lastY, pos.x, pos.y);
    lastX = pos.x; lastY = pos.y;
  } else if (state.mode === 'drag' && dragObj) {
    var pos = getPos(e);
    dragObj.x = pos.x - dragOffX;
    dragObj.y = pos.y - dragOffY;
    redrawAll();
  }
}

function onPointerUp(e) {
  if (isDrawing) {
    isDrawing = false;
    saveUndo();
  }
  if (dragObj) {
    dragObj = null;
    saveUndo();
  }
}

function drawAt(x, y, dot) {
  var now = Date.now();
  if (now - soundThrottle > 80) {
    soundThrottle = now;
    if (state.mode === 'draw') Sound.draw();
    else if (state.mode === 'erase') Sound.erase();
  }
  var s = state.brushSize;
  var cfg = getSandConfig();

  if (state.mode === 'erase') {
    var base = hexToRgb(cfg.base);
    var grain = hexToRgb(cfg.grain);
    for (var e = 0; e < (dot ? 25 : 10); e++) {
      var ox = (Math.random() - 0.5) * s * 0.9;
      var oy = (Math.random() - 0.5) * s * 0.9;
      var r = 2 + Math.random() * s * 0.25;
      var useGrain = Math.random() < 0.35;
      var c = useGrain ? grain : base;
      var noise = (Math.random() - 0.5) * 20;
      ctx.fillStyle = 'rgb(' + clamp(c.r + noise) + ',' + clamp(c.g + noise) + ',' + clamp(c.b + noise) + ')';
      ctx.beginPath();
      ctx.arc(x + ox, y + oy, r, 0, Math.PI * 2);
      ctx.fill();
    }
    return;
  }

  var dark = hexToRgb(cfg.dark);

  ctx.globalCompositeOperation = 'source-over';
  for (var i = 0; i < (dot ? 20 : 8); i++) {
    var ox = (Math.random() - 0.5) * s * 0.8;
    var oy = (Math.random() - 0.5) * s * 0.8;
    var r = s * 0.2 + Math.random() * s * 0.3;
    var shade = 0.6 + Math.random() * 0.3;
    ctx.fillStyle = 'rgba(' + Math.floor(dark.r * shade) + ',' + Math.floor(dark.g * shade) + ',' + Math.floor(dark.b * shade) + ',0.9)';
    ctx.beginPath();
    ctx.arc(x + ox, y + oy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  for (var j = 0; j < 5; j++) {
    var a = Math.random() * Math.PI * 2;
    var dist = s * 0.3 + Math.random() * s * 0.4;
    var px = x + Math.cos(a) * dist;
    var py = y + Math.sin(a) * dist;
    var pr = 2 + Math.random() * 4;
    ctx.fillStyle = 'rgba(255,255,240,' + (0.2 + Math.random() * 0.3) + ')';
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLine(x1, y1, x2, y2) {
  var dist = Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
  var steps = Math.max(1, Math.floor(dist / 2));
  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var x = x1 + (x2 - x1) * t;
    var y = y1 + (y2 - y1) * t;
    drawAt(x, y, false);
  }
}

// ─── Objects ──────────────────────────────────────────────────────────────
function placeObject(idx, x, y) {
  var obj = {
    idx: idx,
    emoji: OBJECTS[idx].emoji,
    x: x,
    y: y,
    size: 24 + state.brushSize * 0.5,
  };
  state.objects.push(obj);
  drawObject(obj);
  Sound.place();
  saveUndo();
}

function drawObject(obj) {
  var fontSize = obj.size || 28;
  ctx.font = fontSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(obj.emoji, obj.x, obj.y);
}

function redrawAll() {
  resetCanvas();
}

// ─── Actions ──────────────────────────────────────────────────────────────
function saveUndo() {
  state.undoStack.push(canvas.toDataURL());
  if (state.undoStack.length > state.maxUndo) state.undoStack.shift();
}

function undo() {
  if (state.undoStack.length <= 1) return;
  state.undoStack.pop();
  Sound.undo();
  restoreFromData(state.undoStack[state.undoStack.length - 1]);
}

function restoreFromData(dataUrl) {
  var img = new Image();
  img.onload = function() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  img.src = dataUrl;
}

function clearCanvas() {
  if (state.objects.length === 0 && state.undoStack.length <= 1) return;
  state.objects = [];
  state.undoStack = [];
  Sound.clear();
  resetCanvas();
}

function showToast(msg, duration) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._hide);
  el._hide = setTimeout(function() { el.classList.remove('show'); }, duration || 2000);
}

function saveImage() {
  Sound.save();
  var blob = canvas.toBlob ? canvas.toBlob(function(b) {
    if (navigator.share && navigator.canShare && navigator.canShare({files:[new File([b], 'drawingsand.png', {type:'image/png'})]})) {
      navigator.share({ files: [new File([b], 'drawingsand.png', {type:'image/png'})], title: 'DrawingSand' }).catch(function(){});
    } else {
      var link = document.createElement('a');
      link.download = 'drawingsand-' + Date.now() + '.png';
      link.href = URL.createObjectURL(b);
      link.click();
      setTimeout(function(){ URL.revokeObjectURL(link.href); }, 1000);
    }
  }, 'image/png') : function() {
    var link = document.createElement('a');
    link.download = 'drawingsand-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
}

// ─── Wave Animation ────────────────────────────────────────────────────────
function waveAnimation() {
  Sound.wave();
  var w = canvas._w, h = canvas._h;
  var startTime = Date.now();
  var duration = 3000;
  var waveImgData = ctx.getImageData(0, 0, w * dpr, h * dpr);

  function foamBubbles(progress) {
    var waveX = w * progress;
    var count = 20 + Math.floor(Math.random() * 15);
    for (var i = 0; i < count; i++) {
      var bx = waveX + (Math.random() - 0.5) * 40;
      var by = Math.random() * h;
      var br = 2 + Math.random() * 6;
      var alpha = 0.3 + Math.random() * 0.5;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawWaterSlice(x, alpha) {
    var grad = ctx.createLinearGradient(0, 0, 0, h);
    var a = alpha * 0.6;
    grad.addColorStop(0, 'rgba(30,120,180,' + (a * 0.7) + ')');
    grad.addColorStop(0.3, 'rgba(20,160,200,' + (a * 0.5) + ')');
    grad.addColorStop(0.6, 'rgba(40,180,210,' + (a * 0.4) + ')');
    grad.addColorStop(1, 'rgba(10,90,140,' + (a * 0.8) + ')');
    ctx.fillStyle = grad;
    ctx.fillRect(x, 0, 2, h);
    if (Math.random() < 0.15) {
      var y = Math.random() * h;
      ctx.fillStyle = 'rgba(255,255,255,' + (alpha * 0.15) + ')';
      ctx.fillRect(x, y, 2, 8 + Math.random() * 12);
    }
  }

  state.objects = [];
  state.undoStack = [];

  function animateWave() {
    var elapsed = Date.now() - startTime;
    var progress = Math.min(elapsed / duration, 1.3);
    var eased = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
    var waveX = w * Math.min(eased, 1);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.putImageData(waveImgData, 0, 0);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    for (var x = 0; x < waveX && x < w; x += 2) {
      var dist = x / waveX;
      var alpha = 0.5 + 0.5 * (1 - dist);
      drawWaterSlice(x, alpha);
    }
    foamBubbles(Math.min(eased, 1));

    if (progress < 1.1) {
      requestAnimationFrame(animateWave);
    } else {
      state.objects = [];
      state.undoStack = [];
      resetCanvas();
      showToast('🌊 Sable lavé par la vague !', 2500);
    }
  }

  animateWave();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
